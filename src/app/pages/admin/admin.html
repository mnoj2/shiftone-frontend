<div class="min-vh-100 d-flex flex-column">

  <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3 pb-4 pt-4">
    <div class="container">

      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
        <div class="d-flex">
          <img src="Logo.svg" alt="" width="35" height="35">
          <span class="fs-2 lh-1 ms-1">ShiftOne</span>
        </div>
      </a>

      <button class="navbar-toggler border-0" type="button"
        data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
        <ul class="nav mt-3 mt-lg-0 d-flex gap-2">
          <li class="nav-item">
            <button class="nav-link px-2 fw-semibold"
              [class.active]="currentView === 'home'"
              (click)="onViewChange('home')">
              User Management
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link px-2 fw-semibold"
              [class.active]="currentView === 'enroll'"
              (click)="onViewChange('enroll')">
              Quick Enroll
            </button>
          </li>
        </ul>

        <button class="btn btn-dark fw-bold mt-3 mt-lg-0 ms-5" (click)="logout()">
          Logout
        </button>
      </div>

    </div>
  </nav>

  <main class="flex-grow-1 pt-2">
    <div class="container">
      @if (currentView === 'home') {
        <app-admin-home></app-admin-home>
      } @else if (currentView === 'enroll') {
        <app-quick-enroll></app-quick-enroll>
      }
    </div>
  </main>

</div>
