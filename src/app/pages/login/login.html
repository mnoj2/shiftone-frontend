<div class="container-fluid min-vh-100 d-flex gap-5 align-items-center justify-content-center bg-light">
    
    <div class="d-none d-lg-flex flex-column justify-content-center me-5">
      <p class="lead display-4 text-secondary">Welcome to</p>
      <div>
        <h1 class="display-3 fw-bold text-dark">ShiftOne</h1>
        <div class="line"></div>
      </div>
    </div>

      <div class="card ms-5">
        <div class="card-body p-4 p-md-5">
          <h2 class="card-title fw-bold mb-4 text-center">Login</h2>

          <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate>
            
            <!-- Email -->
            <div class="mb-3">
              <label class="form-label fw-semibold" for="email">Email</label>
              <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email" required
                pattern="{{emailPattern}}" #emailCtrl="ngModel" placeholder="Enter your email">
              @if (emailCtrl.invalid && emailCtrl.touched) {
                <div class="text-danger small mt-1">Please enter a valid email.</div>
              }
            </div>

            <!-- Password -->
            <div class="mb-3 mt-4">
              <label class="form-label fw-semibold" for="password">Password</label>
              <div class="input-group">
                <input id="password" [type]="hidePassword ? 'password' : 'text'" class="form-control"
                  [(ngModel)]="password" name="password" required minlength="8" #passwordCtrl="ngModel"
                  placeholder="Enter your password">
                <button class="btn" type="button" (click)="hidePassword = !hidePassword">
                  <i class="fa-regular" [ngClass]="hidePassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                </button>
              </div>
              @if (passwordCtrl.invalid && passwordCtrl.touched) {
                <div class="text-danger small mt-1">Password must be at least 8 characters.</div>
              }
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold mt-3" [disabled]="loginForm.invalid || loading">
              @if (!loading) {
                <span>Login</span>
              } @else {
                <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                <span>Logging in...</span>
              }
            </button>
          </form>
        </div>
      </div>

</div>
