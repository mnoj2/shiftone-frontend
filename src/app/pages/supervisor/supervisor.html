<div class="min-vh-100 d-flex flex-column">

  <nav class="navbar navbar-expand-lg pt-3">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
        <div class="d-flex flex-column">
          <span class="fs-2 lh-1">ShiftOne</span>
          <div class="d-flex align-items-center gap-1 mt-1">
            <span class="text-muted fw-normal fs-6">{{ userName }}</span>
            <span class="badge bg-secondary" style="font-size: 0.6rem; letter-spacing: 0.05em;">SUPERVISOR</span>
          </div>
        </div>
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="supervisorNavbar">
        <ul class="nav mx-auto mt-3 mt-lg-0 d-flex gap-3">
          <li class="nav-item">
            <button class="nav-link px-2 fw-semibold" [class.active]="currentView === 'home'" (click)="onViewChange('home')">Home</button>
          </li>
          <li class="nav-item">
            <button class="nav-link px-2 fw-semibold" [class.active]="currentView === 'daily'" (click)="onViewChange('daily')">Daily Records</button>
          </li>
        </ul>

        <button class="btn btn-outline-dark fw-bold mt-3 mt-lg-0" (click)="logout()">
          Logout
        </button>
      </div>
    </div>
  </nav>

  <main class="flex-grow-1 pt-3">
    <div class="container">
      @if (currentView === 'home') {
        <app-supervisor-home></app-supervisor-home>
      }
      @if (currentView === 'daily') {
        <app-supervisor-daily></app-supervisor-daily>
      }
    </div>
  </main>

</div>
