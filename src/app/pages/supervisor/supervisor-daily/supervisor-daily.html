<div class="container py-4">
  <div class="card border-0 shadow-sm mt-2">
    <div class="card-body p-4">

      <div class="row g-3 mb-4">
        <div class="col-lg-8">
          <div class="row g-2 align-items-end">
            <div class="col-sm-5 col-6">
              <label class="form-label fw-semibold small text-muted mb-1">Start Date</label>
              <input type="date" class="form-control" [(ngModel)]="dailyStart">
            </div>
            <div class="col-sm-5 col-6">
              <label class="form-label fw-semibold small text-muted mb-1">End Date</label>
              <input type="date" class="form-control" [(ngModel)]="dailyEnd">
            </div>
            <div class="col-sm-2 col-12 mt-3 mt-sm-0">
              <button class="btn btn-dark w-100 fw-bold" (click)="filterDaily()">
                <i class="fa-solid fa-filter me-1"></i>Filter
              </button>
            </div>
          </div>
        </div>
        <div class="col-lg-4 d-flex justify-content-lg-end align-items-end mt-3 mt-lg-0">
          <button class="btn btn-outline-dark fw-bold" (click)="exportDaily()">
            <i class="fa-solid fa-file-export me-2"></i>Export CSV
          </button>
        </div>
      </div>

      @if (isLoading) {
        <div class="text-center py-5">
          <div class="spinner-border text-dark mb-2" role="status"></div>
          <p class="text-muted small">Fetching records...</p>
        </div>
      } @else if (isError) {
        <div class="alert alert-danger border-0">
          {{ errorMessage }}
        </div>
      } @else if (records.length === 0) {
        <div class="text-center py-5 border rounded bg-white">
          <i class="fa-solid fa-magnifying-glass fa-2x text-muted mb-3 opacity-25"></i>
          <p class="text-muted mb-0">No records found for selected period.</p>
        </div>
      } @else {
        <ag-grid-angular
          style="width: 100%;"
          [rowData]="records"
          [columnDefs]="dailyColumnDefs"
          [defaultColDef]="defaultColDef"
          [animateRows]="true"
          [pagination]="true"
          [paginationPageSizeSelector]="false"
          [paginationPageSize]="8"
          [domLayout]="'autoHeight'"
          [theme]="gridTheme"
          (gridReady)="onGridReady($event)">
        </ag-grid-angular>
      }

    </div>
  </div>
</div>
