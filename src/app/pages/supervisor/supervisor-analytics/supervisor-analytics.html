<div class="container py-4">

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3">
    <ul class="nav nav-pills bg-white shadow-sm p-1 rounded border">
      <li class="nav-item">
        <button class="nav-link px-3 fw-bold active">Work Hours</button>
      </li>
    </ul>

    <div class="d-flex gap-2">
      <select class="form-select form-select-sm fw-bold" [(ngModel)]="selectedMonth" (change)="loadAnalytics()" style="width: 120px;">
        @for (m of months; track $index) {
          <option [value]="$index+1">{{ m }}</option>
        }
      </select>
      <select class="form-select form-select-sm fw-bold" [(ngModel)]="selectedYear" (change)="loadAnalytics()" style="width: 100px;">
        @for (y of years; track y) {
          <option [value]="y">{{ y }}</option>
        }
      </select>
    </div>
  </div>

  <div class="tab-content position-relative">

    @if (isLoading) {
      <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-white rounded" style="z-index: 10; opacity: 0.85;">
        <div class="text-center">
          <div class="spinner-border text-dark mb-2" role="status"></div>
          <p class="text-muted fw-bold small">Analyzing...</p>
        </div>
      </div>
    }

    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body p-4 d-flex align-items-center justify-content-center" style="min-height: 450px;">
        <div class="w-100">
          @if (hasMonthlyData) {
            <highcharts-chart
              [options]="hoursChartOptions"
              [(update)]="updateHoursChart"
              style="width: 100%; height: 400px; display: block;">
            </highcharts-chart>
          } @else if (!isLoading) {
            <div class="text-center py-5 text-muted opacity-50">
              <i class="fas fa-clock fa-3x mb-3"></i>
              <h5 class="fw-bold">No hour data found.</h5>
            </div>
          }
        </div>
      </div>
    </div>

  </div>
</div>
