<div class="min-vh-100 bg-light d-flex flex-column">

  <nav class="navbar navbar-expand-lg pt-3">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
        <span class="fs-2">ShiftOne</span>
        <span class="badge bg-secondary ms-2 small" style="font-size: 0.6rem; letter-spacing: 0.05em;">WORKER</span>
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">
        <ul class="nav mx-auto mt-3 mt-lg-0 d-flex gap-3">
          <li class="nav-item">
            <button class="nav-link px-2 fw-semibold" [class.active]="currentView === 'home'" (click)="onViewChange('home')">Home</button>
          </li>
          <li class="nav-item">
            <button class="nav-link px-2 fw-semibold" [class.active]="currentView === 'history'" (click)="onViewChange('history')">History</button>
          </li>
        </ul>

        <button class="btn btn-outline-dark fw-bold mt-3 mt-lg-0" (click)="logout()">
          Logout
        </button>
      </div>
    </div>
  </nav>

  <main class="flex-grow-1 pt-3">
    <div class="container">
      @if (currentView === 'home') {
        <app-worker-home></app-worker-home>
      }
      @if (currentView === 'history') {
        <app-worker-history></app-worker-history>
      }
    </div>
  </main>

</div>
